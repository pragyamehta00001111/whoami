<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20 LPA DevSecOps Roadmap Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#4f46e5', // Indigo 600
                        primaryHover: '#4338ca', // Indigo 700
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #e0e7ff 100%);
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Custom Scrollbar for task list */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .task-enter {
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .calendar-day-hover:hover {
            background-color: #eef2ff;
            color: #4f46e5;
        }
        
        .calendar-day.active {
            background-color: #4f46e5;
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39);
        }
    </style>
</head>
<body class="text-slate-800 antialiased flex items-center justify-center p-4 md:p-8">

    <div class="glass-panel w-full max-w-6xl h-full max-h-[900px] rounded-3xl shadow-2xl flex flex-col md:flex-row overflow-hidden">
        
        <!-- Left Section: Calendar -->
        <div class="w-full md:w-7/12 lg:w-2/3 p-6 md:p-10 flex flex-col h-full border-b md:border-b-0 md:border-r border-slate-200">
            
            <!-- Calendar Header -->
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-slate-900" id="month-year-display">June 2026</h1>
                    <p class="text-primary mt-1 text-sm font-bold uppercase tracking-wide">20 LPA DevSecOps Roadmap</p>
                    <p class="text-slate-500 mt-1 text-sm font-medium" id="today-date-display">Today is Wednesday, June 17</p>
                </div>
                <div class="flex space-x-2">
                    <button onclick="changeMonth(-1)" class="p-2 rounded-full hover:bg-slate-100 transition-colors text-slate-600 focus:outline-none">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <button onclick="resetToToday()" class="px-4 py-2 rounded-full hover:bg-slate-100 transition-colors text-slate-700 text-sm font-medium focus:outline-none">
                        Today
                    </button>
                    <button onclick="changeMonth(1)" class="p-2 rounded-full hover:bg-slate-100 transition-colors text-slate-600 focus:outline-none">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
            </div>

            <!-- Calendar Grid -->
            <div class="flex-grow flex flex-col">
                <!-- Days of Week -->
                <div class="grid grid-cols-7 gap-2 mb-4">
                    <div class="text-center text-xs font-semibold text-slate-400 uppercase tracking-wider">Sun</div>
                    <div class="text-center text-xs font-semibold text-slate-400 uppercase tracking-wider">Mon</div>
                    <div class="text-center text-xs font-semibold text-slate-400 uppercase tracking-wider">Tue</div>
                    <div class="text-center text-xs font-semibold text-slate-400 uppercase tracking-wider">Wed</div>
                    <div class="text-center text-xs font-semibold text-slate-400 uppercase tracking-wider">Thu</div>
                    <div class="text-center text-xs font-semibold text-slate-400 uppercase tracking-wider">Fri</div>
                    <div class="text-center text-xs font-semibold text-slate-400 uppercase tracking-wider">Sat</div>
                </div>
                
                <!-- Days Grid -->
                <div id="calendar-days" class="grid grid-cols-7 gap-2 flex-grow auto-rows-fr">
                    <!-- JavaScript will populate days here -->
                </div>
            </div>
        </div>

        <!-- Right Section: Tasks & Info -->
        <div class="w-full md:w-5/12 lg:w-1/3 bg-slate-50/50 p-6 md:p-8 flex flex-col h-full overflow-y-auto">
            
            <!-- Days Left Widgets -->
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-indigo-600 p-4 rounded-2xl shadow-md border border-indigo-500 flex flex-col items-center justify-center text-center text-white">
                    <div class="text-3xl font-bold mb-1"><i class="fa-solid fa-rocket"></i></div>
                    <div class="text-xs font-medium text-indigo-100 uppercase tracking-wide">Phase 1<br>Linux & Scripting</div>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center text-center">
                    <div class="text-3xl font-bold text-orange-500 mb-1" id="days-left-year">--</div>
                    <div class="text-xs font-medium text-slate-500 uppercase tracking-wide">Days left<br>to 20 LPA Goal</div>
                </div>
            </div>

            <!-- Task Section Header -->
            <div class="mb-6">
                <h2 class="text-xl font-bold text-slate-900 flex items-center justify-between">
                    <span>What to do</span>
                    <span id="selected-date-label" class="text-sm font-medium text-primary bg-indigo-50 px-3 py-1 rounded-full">Today</span>
                </h2>
                <p class="text-sm text-slate-500 mt-1" id="selected-date-full">June 17, 2026</p>
            </div>

            <!-- Task Input -->
            <form id="task-form" class="mb-6 flex gap-2" onsubmit="addTask(event)">
                <input type="text" id="task-input" placeholder="Add a new task..." 
                    class="flex-grow bg-white border border-slate-200 text-slate-700 text-sm rounded-xl focus:ring-2 focus:ring-primary focus:border-primary block p-3 outline-none transition-all shadow-sm">
                <button type="submit" class="bg-primary hover:bg-primaryHover text-white rounded-xl px-4 py-2 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary flex items-center justify-center">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </form>

            <!-- Task List -->
            <div class="flex-grow overflow-y-auto pr-2 pb-10" id="task-list">
                <!-- JavaScript will populate tasks here -->
                <div class="text-center text-slate-400 mt-10 hidden" id="empty-state">
                    <i class="fa-regular fa-calendar-check text-4xl mb-3 opacity-50"></i>
                    <p class="text-sm">No tasks for this day.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let currentDate = new Date(); // Represents the month currently being viewed
        let selectedDate = new Date(); // Represents the day clicked for tasks
        const actualToday = new Date(); // The real world "today"
        
        // Task Storage (Format: { "YYYY-MM-DD": [ {id, text, completed} ] })
        let tasks = JSON.parse(localStorage.getItem('plannerTasksV2'));

        if (!tasks || Object.keys(tasks).length === 0) {
            tasks = {};
            const roadmapDays = [
                ["Install Linux (WSL or VM) & Learn basic CLI (ls, cd, mkdir)", "Set up GitHub account & Git basics", "Read: OSI Model & TCP/IP Basics"],
                ["Learn Linux permissions (chmod, chown)", "Write first Bash script (Automate backups)", "Practice Git commit, push, pull"],
                ["Learn Bash variables, loops, and conditionals", "Understand DNS resolution and HTTP/HTTPS", "Write a Python script to read/write files"],
                ["Set up SSH keys & connect to a remote server", "Learn Cronjobs for scheduling scripts", "Python: APIs and JSON parsing"],
                ["Create AWS Free Tier account", "Launch an EC2 instance manually", "Understand VPCs, Subnets, and Security Groups"],
                ["Install Docker locally", "Write a Dockerfile for a simple web app", "Run and manage Docker containers"],
                ["Learn Docker Compose for multi-container apps", "Push Docker image to Docker Hub", "AWS: Set up IAM users and roles"],
                ["Introduction to Terraform (IaC)", "Deploy an EC2 instance using Terraform", "Understand Terraform state"],
                ["Set up a CI/CD pipeline with GitHub Actions", "Automate Docker image build in CI/CD", "Deploy app to EC2 via GitHub Actions"],
                ["Read about OWASP Top 10", "Implement basic security scanning in CI/CD", "Optimize resume for remote DevSecOps roles"]
            ];

            let startDate = new Date(actualToday);
            startDate.setDate(startDate.getDate() + 1); // Start from tomorrow
            
            roadmapDays.forEach((dayTasks, index) => {
                let targetDate = new Date(startDate);
                targetDate.setDate(startDate.getDate() + index);
                let dateKey = formatDateKey(targetDate);
                
                tasks[dateKey] = dayTasks.map((text, i) => ({
                    id: `init-${index}-${i}`,
                    text: text,
                    completed: false
                }));
            });
            localStorage.setItem('plannerTasksV2', JSON.stringify(tasks));
        }

        // DOM Elements
        const calendarDaysEl = document.getElementById('calendar-days');
        const monthYearDisplay = document.getElementById('month-year-display');
        const todayDateDisplay = document.getElementById('today-date-display');
        const selectedDateLabel = document.getElementById('selected-date-label');
        const selectedDateFull = document.getElementById('selected-date-full');
        const taskListEl = document.getElementById('task-list');
        const taskInput = document.getElementById('task-input');
        const emptyState = document.getElementById('empty-state');
        
        // Constants
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

        // Format Date to YYYY-MM-DD for storage keys
        function formatDateKey(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        // Initialize App
        function init() {
            todayDateDisplay.innerText = `Today is ${dayNames[actualToday.getDay()]}, ${monthNames[actualToday.getMonth()]} ${actualToday.getDate()}`;
            renderCalendar();
            updateDaysLeft();
            selectDate(actualToday);
        }

        // Calendar Logic
        function renderCalendar() {
            calendarDaysEl.innerHTML = '';
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            monthYearDisplay.innerText = `${monthNames[month]} ${year}`;
            
            const firstDayOfMonth = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            
            // Previous Month Padding Days
            for (let i = firstDayOfMonth - 1; i >= 0; i--) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'calendar-day flex items-center justify-center rounded-xl text-slate-300 font-medium text-sm cursor-default';
                dayDiv.innerText = daysInPrevMonth - i;
                calendarDaysEl.appendChild(dayDiv);
            }
            
            // Current Month Days
            for (let i = 1; i <= daysInMonth; i++) {
                const dayDiv = document.createElement('div');
                const loopDate = new Date(year, month, i);
                const dateKey = formatDateKey(loopDate);
                
                dayDiv.className = 'calendar-day calendar-day-hover flex items-center justify-center rounded-xl text-slate-700 font-medium text-sm cursor-pointer transition-all relative';
                dayDiv.innerText = i;
                
                // Highlight Actual Today
                if (year === actualToday.getFullYear() && month === actualToday.getMonth() && i === actualToday.getDate()) {
                    dayDiv.classList.add('border-2', 'border-primary', 'text-primary', 'font-bold');
                }
                
                // Highlight Selected Date
                if (year === selectedDate.getFullYear() && month === selectedDate.getMonth() && i === selectedDate.getDate()) {
                    dayDiv.classList.add('active');
                    dayDiv.classList.remove('text-primary');
                }

                // Add indicator dot if there are tasks
                if (tasks[dateKey] && tasks[dateKey].length > 0) {
                    const hasIncomplete = tasks[dateKey].some(t => !t.completed);
                    const dot = document.createElement('div');
                    dot.className = `absolute bottom-1 w-1.5 h-1.5 rounded-full ${hasIncomplete ? 'bg-orange-400' : 'bg-green-400'}`;
                    dayDiv.appendChild(dot);
                }
                
                dayDiv.onclick = () => {
                    selectDate(loopDate);
                    renderCalendar(); // Re-render to update active state classes
                };
                
                calendarDaysEl.appendChild(dayDiv);
            }
            
            // Next Month Padding Days
            const totalCells = firstDayOfMonth + daysInMonth;
            const remainingCells = 42 - totalCells; // 6 rows * 7 days
            
            for (let i = 1; i <= remainingCells; i++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'calendar-day flex items-center justify-center rounded-xl text-slate-300 font-medium text-sm cursor-default';
                dayDiv.innerText = i;
                calendarDaysEl.appendChild(dayDiv);
            }
        }

        // Navigation
        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }

        function resetToToday() {
            currentDate = new Date(actualToday);
            selectDate(actualToday);
            renderCalendar();
        }

        function selectDate(date) {
            selectedDate = new Date(date);
            
            const isToday = formatDateKey(selectedDate) === formatDateKey(actualToday);
            selectedDateLabel.innerText = isToday ? "Today" : "Selected";
            selectedDateLabel.className = `text-sm font-medium px-3 py-1 rounded-full ${isToday ? 'text-primary bg-indigo-50' : 'text-slate-600 bg-slate-200'}`;
            
            selectedDateFull.innerText = `${dayNames[selectedDate.getDay()]}, ${monthNames[selectedDate.getMonth()]} ${selectedDate.getDate()}, ${selectedDate.getFullYear()}`;
            
            renderTasks();
        }

        // Calculate Days Left
        function updateDaysLeft() {
            // Career Goal Countdown (2 Years / 730 days from start)
            const goalDate = new Date(actualToday.getFullYear() + 2, actualToday.getMonth(), actualToday.getDate());
            const diffTime = Math.abs(goalDate - actualToday);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
            document.getElementById('days-left-year').innerText = diffDays;
        }

        // Task Management
        function saveTasks() {
            localStorage.setItem('plannerTasksV2', JSON.stringify(tasks));
            renderCalendar(); // Re-render to show/hide dots on calendar
        }

        function addTask(e) {
            e.preventDefault();
            const text = taskInput.value.trim();
            if (!text) return;

            const dateKey = formatDateKey(selectedDate);
            if (!tasks[dateKey]) {
                tasks[dateKey] = [];
            }

            const newTask = {
                id: Date.now().toString(),
                text: text,
                completed: false
            };

            tasks[dateKey].push(newTask);
            saveTasks();
            
            taskInput.value = '';
            renderTasks();
        }

        function toggleTask(id) {
            const dateKey = formatDateKey(selectedDate);
            const task = tasks[dateKey].find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
            }
        }

        function deleteTask(id) {
            const dateKey = formatDateKey(selectedDate);
            tasks[dateKey] = tasks[dateKey].filter(t => t.id !== id);
            
            if (tasks[dateKey].length === 0) {
                delete tasks[dateKey]; // Clean up empty arrays
            }
            
            saveTasks();
            renderTasks();
        }

        function renderTasks() {
            const dateKey = formatDateKey(selectedDate);
            const currentTasks = tasks[dateKey] || [];
            
            // Clear current list except empty state
            Array.from(taskListEl.children).forEach(child => {
                if (child.id !== 'empty-state') {
                    child.remove();
                }
            });

            if (currentTasks.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                
                currentTasks.forEach(task => {
                    const taskEl = document.createElement('div');
                    taskEl.className = `task-enter flex items-center justify-between p-3 mb-2 rounded-xl border ${task.completed ? 'bg-slate-50 border-slate-100 opacity-60' : 'bg-white border-slate-200 shadow-sm'}`;
                    
                    taskEl.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <button onclick="toggleTask('${task.id}')" class="flex-shrink-0 w-5 h-5 rounded border ${task.completed ? 'bg-green-500 border-green-500 text-white' : 'border-slate-300 text-transparent hover:border-primary'} flex items-center justify-center transition-colors focus:outline-none">
                                <i class="fa-solid fa-check text-xs"></i>
                            </button>
                            <span class="text-sm truncate ${task.completed ? 'line-through text-slate-500' : 'text-slate-700'}">${escapeHtml(task.text)}</span>
                        </div>
                        <button onclick="deleteTask('${task.id}')" class="flex-shrink-0 text-slate-400 hover:text-red-500 transition-colors focus:outline-none ml-2">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    `;
                    taskListEl.appendChild(taskEl);
                });
            }
        }

        // Utility to prevent XSS
        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        // Run on load
        window.onload = init;
    </script>
</body>
</html>
